# Nginx: SPA (React) + proxy /api al backend Compras Verdu
# En Docker Compose el servicio backend se resuelve como host "backend", puerto 4000.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Vite empaqueta JS/CSS con hash; immutable 1y hacía que tras un deploy el navegador siguiera con bundles viejos
    # si index.html quedaba cacheado en algún proxy. Revalidación frecuente evita login “congelado” en producción.
    location ~* \.(js|css|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }
}
