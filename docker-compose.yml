# =============================================================================
# Docker Compose - Compras Verdu (producción)
# =============================================================================
# Backend: env_file ./backend/.env (JWT, FRONTEND_URL, SQL Server, EXTERNAL_*).
# En el contenedor se fuerzan NODE_ENV=production, PORT=4000 y DATABASE_URL=@db:5432
# (no usar 127.0.0.1 dentro del contenedor).
#
# Sustitución ${POSTGRES_USER} / ${POSTGRES_PASSWORD} / ${POSTGRES_DB} en ESTE archivo:
#   Docker Compose las toma del shell o de `env` / `.env` en la RAÍZ del repo (no de backend/.env).
#   Usá ./scripts/docker-compose-env.sh up -d --build para que se aplique `env` o `.env` en la raíz.
#   Esos valores deben coincidir con las credenciales del volumen Postgres (no cambiar sin plan).
#
# Seed desde el host: npm run db:seed (en la raíz).
# Uso: docker compose up -d --build   o   ./scripts/docker-compose-env.sh up -d --build
# Frontend: http://localhost:8081 (no usa 80 para convivir con Ticketador).
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: compras_verdu_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-compras_verdu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-compras_verdu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-compras_verdu}
    volumes:
      - compras_verdu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-compras_verdu} -d ${POSTGRES_DB:-compras_verdu}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - compras-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compras_verdu_backend
    # Misma configuración que en desarrollo; JWT, SQL Server, FRONTEND_URL, etc. vienen de backend/.env
    env_file:
      - ./backend/.env
    environment:
      # Obligatorio en Docker: la app dentro del contenedor debe usar el hostname del servicio Postgres, no 127.0.0.1
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-compras_verdu}:${POSTGRES_PASSWORD:-compras_verdu_secret}@db:5432/${POSTGRES_DB:-compras_verdu}?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - compras-network

  frontend:
    build:
      # Raíz del repo: permite copiar img/ hacia public/img (el symlink local no vale en Docker).
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: compras_verdu_frontend
    expose:
      - "80"
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - compras-network

volumes:
  compras_verdu_pgdata:
    driver: local

networks:
  compras-network:
    driver: bridge
