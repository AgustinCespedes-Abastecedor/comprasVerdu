# =============================================================================
# Nginx: Ticketador + Compras Verdu en paralelo (mismo host, puertos 80/443)
# =============================================================================
# Reemplazá TICKETADOR_DOMINIO por el dominio real de Ticketador
# (ej: ticketador.elabastecedor.com.ar o el que uses).
#
# Ticketador → proxy a 127.0.0.1:8080
# Compras Verdu → proxy a 127.0.0.1:8081
#
# Copiar a /etc/nginx/sites-available/elabastecedor y habilitar.
# Certificados (uno por dominio):
#   sudo certbot --nginx -d TICKETADOR_DOMINIO -d cverdu.elabastecedor.com.ar
# =============================================================================

# -------- Ticketador (contenedor nginx en 8082) --------
server {
    listen 80;
    server_name TICKETADOR_DOMINIO;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# -------- Compras Verdu --------
server {
    listen 80;
    server_name cverdu.elabastecedor.com.ar;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
