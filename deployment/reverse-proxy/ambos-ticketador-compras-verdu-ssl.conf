# =============================================================================
# Nginx: Ticketador + Compras Verdu con HTTPS (Let's Encrypt)
# =============================================================================
# Reemplazá TICKETADOR_DOMINIO por el dominio real (ej: ticketador.elabastecedor.com.ar).
# Certificados en /etc/letsencrypt/live/DOMINIO/ (certbot los crea).
# =============================================================================

# -------- Ticketador: HTTP → HTTPS --------
server {
    listen 80;
    server_name TICKETADOR_DOMINIO;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -------- Ticketador: HTTPS --------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name TICKETADOR_DOMINIO;

    ssl_certificate     /etc/letsencrypt/live/TICKETADOR_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TICKETADOR_DOMINIO/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

