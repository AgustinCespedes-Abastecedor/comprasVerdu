# =============================================================================
# Nginx: solo Compras Verdu (cverdu.elabastecedor.com.ar)
# =============================================================================
# Uso: si ya tenés Nginx con Ticketador, copiá este archivo a
#      /etc/nginx/sites-available/ y habilitá el sitio.
#      Ej: sudo cp cverdu-only.conf /etc/nginx/sites-available/cverdu.elabastecedor.com.ar
#          sudo ln -sf /etc/nginx/sites-available/cverdu.elabastecedor.com.ar /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# Certificados: sudo certbot --nginx -d cverdu.elabastecedor.com.ar
# =============================================================================

server {
    listen 80;
    server_name cverdu.elabastecedor.com.ar;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
